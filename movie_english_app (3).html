<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinema Lines · 영화로 배우는 영어</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf7f0;
  --bg-warm: #ffffff;
  --ink: #1a1614;
  --gold: #b8893d;
  --gold-dim: #8b6f47;
  --red: #a01e23;
  --green: #5a7a4a;
  --text-dim: #6b6358;
  --line: rgba(139, 111, 71, 0.25);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  background-image: 
    radial-gradient(ellipse at top, rgba(184, 137, 61, 0.12) 0%, transparent 50%),
    radial-gradient(ellipse at bottom, rgba(160, 30, 35, 0.06) 0%, transparent 50%);
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.4'/%3E%3C/svg%3E");
  opacity: 0.08;
  pointer-events: none;
  z-index: 100;
  mix-blend-mode: multiply;
}

.container {
  max-width: 880px;
  margin: 0 auto;
  padding: 40px 24px 80px;
  position: relative;
}

/* Header */
.header {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  border-bottom: 1px solid var(--line);
  padding-bottom: 24px;
  margin-bottom: 40px;
}

.logo {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 800;
  font-size: 28px;
  letter-spacing: -0.03em;
  color: var(--ink);
}

.logo span {
  color: var(--gold);
  font-style: italic;
  font-weight: 300;
}

.tagline {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-dim);
}

/* Scene Card */
.scene {
  background: var(--bg-warm);
  border: 1px solid var(--line);
  position: relative;
  overflow: hidden;
  animation: fadeUp 0.5s ease;
  box-shadow: 0 24px 48px -16px rgba(26, 22, 20, 0.08), 0 8px 16px -8px rgba(26, 22, 20, 0.04);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.scene-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 32px;
  border-bottom: 1px solid var(--line);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-dim);
}

.scene-meta .left {
  display: flex;
  gap: 18px;
  align-items: center;
  flex-wrap: wrap;
}

.dot {
  width: 6px;
  height: 6px;
  background: var(--red);
  border-radius: 50%;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.movie-title { color: var(--gold); }

.counter .current {
  color: var(--gold);
  font-size: 14px;
}

/* Scene layout: poster left, content right */
.scene-inner {
  display: flex;
  min-height: 340px;
}

.scene-poster {
  width: 180px;
  min-width: 180px;
  background: #1a1614;
  position: relative;
  overflow: hidden;
  border-right: 1px solid var(--line);
}

.scene-poster img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center top;
  display: block;
  opacity: 0;
  transition: opacity 0.5s ease;
}

.scene-poster img.loaded { opacity: 1; }

.scene-poster .poster-fallback {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--gold-dim);
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-align: center;
  padding: 16px;
  gap: 8px;
}

.scene-content {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* Remove old image wrap */
.scene-image-wrap { display: none; }

@media (max-width: 640px) {
  .scene-inner { flex-direction: column; }
  .scene-poster { width: 100%; min-width: unset; height: 200px; border-right: none; border-bottom: 1px solid var(--line); }
}

/* Quote display */
.scene-body {
  padding: 40px 48px 32px;
  text-align: center;
  position: relative;
}

.scene-body::before,
.scene-body::after { display: none; }

.quote {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: clamp(20px, 3vw, 32px);
  font-style: italic;
  font-weight: 300;
  line-height: 1.55;
  color: var(--ink);
  max-width: 720px;
  margin: 0 auto 20px;
  position: relative;
  z-index: 1;
  letter-spacing: -0.01em;
}

/* Listening hidden quote */
.quote.hidden {
  color: var(--text-dim);
  letter-spacing: 0.3em;
  font-style: normal;
}

.movie-label {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 10px;
}

.character {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold-dim);
}

.character::before { content: '— '; }

/* Action row: replay + reveal */
.actions {
  display: flex;
  justify-content: center;
  gap: 10px;
  padding: 0 32px 24px;
  flex-wrap: wrap;
}

/* Listening section */
.listen-section {
  padding: 32px 48px;
  border-top: 1px dashed var(--line);
  background: rgba(184, 137, 61, 0.04);
}

.section-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 14px;
  text-align: center;
  display: flex;
  align-items: center;
  gap: 12px;
  justify-content: center;
}

.section-label::before,
.section-label::after {
  content: '';
  flex: 1;
  max-width: 60px;
  height: 1px;
  background: var(--line);
}

.listen-input {
  width: 100%;
  background: var(--bg-warm);
  border: 1px solid var(--line);
  color: var(--ink);
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 18px;
  padding: 16px 22px;
  text-align: center;
  outline: none;
  transition: border-color 0.3s;
}

.listen-input:focus {
  border-color: var(--gold);
}

.listen-input::placeholder {
  color: var(--text-dim);
  font-style: italic;
  opacity: 0.6;
}

.listen-buttons {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-top: 14px;
  flex-wrap: wrap;
}

.feedback {
  margin-top: 16px;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.08em;
  min-height: 18px;
  text-align: center;
}

.feedback.correct { color: var(--green); }
.feedback.partial { color: var(--gold); }
.feedback.wrong { color: var(--red); }

/* Pronunciation */
.pronunciation {
  margin-top: 14px;
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  color: var(--text-dim);
  letter-spacing: 0.04em;
  display: none;
}

.pronunciation.show {
  display: block;
  animation: fadeIn 0.3s;
}

.pronunciation::before {
  content: '발음 · ';
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold-dim);
  margin-right: 4px;
}

/* Translation */
.translation {
  margin: 0 48px;
  padding: 20px 0;
  border-top: 1px dashed var(--line);
  font-size: 15px;
  color: var(--text-dim);
  line-height: 1.6;
  text-align: center;
  display: none;
}

.translation.show {
  display: block;
  animation: fadeIn 0.3s;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.translation strong {
  color: var(--gold);
  font-weight: 500;
  margin-right: 6px;
}

/* Footer / Nav */
.nav {
  padding: 20px 32px;
  border-top: 1px solid var(--line);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  background: var(--bg-warm);
}

/* Buttons */
.btn {
  background: transparent;
  border: 1px solid var(--gold-dim);
  color: var(--ink);
  padding: 11px 20px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.25s ease;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.btn:hover {
  background: var(--gold);
  color: #fff;
  border-color: var(--gold);
}

.btn:disabled {
  opacity: 0.35;
  cursor: not-allowed;
}

.btn.primary {
  background: var(--ink);
  color: var(--bg);
  border-color: var(--ink);
}

.btn.primary:hover {
  background: var(--gold);
  border-color: var(--gold);
  color: #fff;
}

.btn.ghost {
  border-color: var(--line);
  color: var(--text-dim);
}

.btn.ghost:hover {
  color: var(--gold);
  background: transparent;
  border-color: var(--gold-dim);
}

.icon {
  width: 14px;
  height: 14px;
  fill: currentColor;
  stroke: currentColor;
}

/* Hint */
.hint {
  text-align: center;
  margin-top: 20px;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--text-dim);
  text-transform: uppercase;
  line-height: 1.8;
}

@media (max-width: 640px) {
  .header { flex-direction: column; align-items: flex-start; gap: 10px; }
  .scene-image-wrap { height: 160px; }
  .scene-body { padding: 40px 24px 24px; }
  .scene-meta { padding: 14px 20px; }
  .scene-meta .left { gap: 12px; font-size: 10px; }
  .listen-section { padding: 24px 20px; }
  .translation { margin: 0 20px; }
  .nav { padding: 16px 20px; }
  .actions { padding: 0 20px 20px; }
  .scene-body::before { top: 16px; left: 16px; font-size: 100px; }
  .scene-body::after { bottom: -40px; right: 16px; font-size: 100px; }
}
</style>
</head>

<div class="container">

    <div class="scene-meta">
      <div class="left">
        <span class="dot"></span>
        <span>Scene <span id="sceneNum">01</span></span>
        <span class="movie-title" id="movieTitle">—</span>
      </div>
      <div class="counter">
        <span class="current" id="currentNum">1</span> / <span id="totalNum">25</span>
      </div>
    </div>

    <div class="scene-inner">

          <div class="pronunciation" id="pronunciation"></div>

        <div class="actions">
          <button class="btn" id="replayBtn">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>

            천천히
          </button>
          <button class="btn ghost" id="revealBtn" style="display:none">
        </div>

        <div class="translation" id="translation"></div>
      </div>
    </div>

    <div class="nav">
      <button class="btn ghost" id="prevBtn">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        이전
      </button>
      <button class="btn ghost" id="pronounceBtn">한국어 발음</button>
      <button class="btn ghost" id="translateBtn">한국어 해석</button>
      <button class="btn primary" id="nextBtn">
        다음
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
  </div>

  <div class="hint">
    🎬 대사를 듣고 따라 말해보세요 · 준비되면 다음으로
  </div>
</div>

  { text: "Nobody puts Baby in a corner.", character: "Johnny Castle", movie: "Dirty Dancing (1987)", translation: "아무도 베이비를 구석에 두지 않아.", pronunciation: "노바디 풋츠 베이비 인 어 코너.", img: "https://upload.wikimedia.org/wikipedia/en/d/d9/Dirty_Dancing.jpg" },
  { text: "I feel the need... the need for speed!", character: "Maverick", movie: "Top Gun (1986)", translation: "나는 느낀다... 속도에 대한 갈망을!", pronunciation: "아이 필 더 니드... 더 니드 포 스피드!", img: "https://upload.wikimedia.org/wikipedia/en/4/48/Top_gun_movie_poster.jpg" },
  { text: "Here's to the ones who dream, foolish as they may seem.", character: "Mia", movie: "La La Land (2016)", translation: "꿈꾸는 사람들을 위하여, 어리석어 보일지라도.", pronunciation: "히얼즈 투 더 원스 후 드림, 풀리쉬 애즈 데이 메이 씸." },
  { text: "You are every reason, every hope, and every dream I've ever had.", character: "Noah", movie: "The Notebook (2004)", translation: "당신은 내가 가진 모든 이유, 모든 희망, 모든 꿈이에요.", pronunciation: "유 아 에브리 리즌, 에브리 호프, 앤드 에브리 드림 아이브 에버 해드." },
  { text: "We're all traveling through time together, every day of our lives.", character: "Tim", movie: "About Time (2013)", translation: "우리는 모두 매일 함께 시간을 여행하고 있어요.", pronunciation: "위어 올 트래블링 쓰루 타임 투게더, 에브리 데이 오브 아워 라이브즈." },
  { text: "To me, you are perfect.", character: "Mark", movie: "Love Actually (2003)", translation: "나한테 당신은 완벽해요.", pronunciation: "투 미, 유 아 퍼펙트." },
  { text: "After all this time? Always.", character: "Snape", movie: "Harry Potter and the Deathly Hallows (2011)", translation: "이 오랜 시간이 지나도? 항상.", pronunciation: "애프터 올 디스 타임? 올웨이즈." },
  { text: "It's not who I am underneath, but what I do that defines me.", character: "Bruce Wayne", movie: "Batman Begins (2005)", translation: "중요한 건 내 내면이 아니라, 내가 하는 행동이 나를 정의해.", pronunciation: "잇츠 낫 후 아이 앰 언더니스, 벗 왓 아이 두 댓 디파인즈 미." },
  { text: "You make me want to be a better man.", character: "Melvin Udall", movie: "As Good as It Gets (1997)", translation: "당신은 나를 더 나은 사람이 되고 싶게 만들어요.", pronunciation: "유 메이크 미 원트 투 비 어 베러 맨." },
  { text: "Every passing minute is another chance to turn it all around.", character: "Sofia", movie: "Vanilla Sky (2001)", translation: "매 순간은 모든 것을 바꿀 수 있는 또 다른 기회야.", pronunciation: "에브리 패싱 미닛 이즈 어나더 챈스 투 턴 잇 올 어라운드." },
  { text: "The greatest thing you'll ever learn is just to love and be loved in return.", character: "Christian", movie: "Moulin Rouge! (2001)", translation: "당신이 배울 수 있는 가장 위대한 것은 사랑하고 사랑받는 것이에요.", pronunciation: "더 그레이티스트 씽 유일 에버 런 이즈 저스트 투 러브 앤드 비 러브드 인 리턴." },
  { text: "Why don't you love me? I'm sorry, why don't you love me?", character: "Allie", movie: "The Notebook (2004)", translation: "왜 날 사랑하지 않아요? 미안해요, 왜 날 사랑하지 않아요?", pronunciation: "와이 돈트 유 러브 미? 아임 쏘리, 와이 돈트 유 러브 미?" },
  { text: "I wish I knew how to quit you.", character: "Jack Twist", movie: "Brokeback Mountain (2005)", translation: "당신을 그만두는 법을 알았으면 좋겠어.", pronunciation: "아이 위시 아이 뉴 하우 투 퀴트 유." },
  { text: "You is kind, you is smart, you is important.", character: "Aibileen Clark", movie: "The Help (2011)", translation: "당신은 친절해요, 당신은 똑똑해요, 당신은 소중해요.", pronunciation: "유 이즈 카인드, 유 이즈 스마트, 유 이즈 임포턴트." },
  { text: "What do you care what they say? It's just noise.", character: "Sonny Hayes", movie: "F1 The Movie (2025)", translation: "그들이 뭐라 하든 왜 신경 써? 그냥 소음일 뿐이야.", pronunciation: "왓 두 유 케어 왓 데이 세이? 잇츠 저스트 노이즈." },
  { text: "Hope is not a strategy. Create your own breaks.", character: "Sonny Hayes", movie: "F1 The Movie (2025)", translation: "희망은 전략이 아니야. 스스로 기회를 만들어.", pronunciation: "호프 이즈 낫 어 스트래티지. 크리에이트 유어 오운 브레이크스." },
  { text: "Drive fast.", character: "Sonny Hayes", movie: "F1 The Movie (2025)", translation: "빠르게 달려.", pronunciation: "드라이브 패스트." },
  { text: "Three laps is a lifetime!", character: "Sonny Hayes", movie: "F1 The Movie (2025)", translation: "세 바퀴는 평생이야!", pronunciation: "쓰리 랩스 이즈 어 라이프타임!" },
  { text: "It's rare, but sometimes there's this moment in the car where everything goes quiet, and I can see everything, and no one can touch me.", character: "Sonny Hayes", movie: "F1 The Movie (2025)", translation: "드물지만, 가끔 차 안에서 모든 게 고요해지는 순간이 있어. 모든 게 보이고, 아무도 날 건드릴 수 없어.", pronunciation: "잇츠 레어, 벗 썸타임즈 데얼즈 디스 모먼트 인 더 카 웨어 에브리씽 고즈 콰이엇, 앤드 아이 캔 씨 에브리씽, 앤드 노원 캔 터치 미." },
  { text: "For what it's worth, don't be shitty to yourself.", character: "Sonny Hayes", movie: "F1 The Movie (2025)", translation: "적어도 이것만은, 자신에게 너무 가혹하게 굴지 마.", pronunciation: "포 왓 잇츠 워스, 돈트 비 쉬티 투 유어셀프." },
  { text: "Meet me in Montauk.", character: "Clementine", movie: "Eternal Sunshine of the Spotless Mind (2004)", translation: "몬탁에서 만나요.", pronunciation: "밋 미 인 몬톡." },
  { text: "How happy is the blameless vestal's lot! The world forgetting, by the world forgot. Eternal sunshine of the spotless mind!", character: "Joel", movie: "Eternal Sunshine of the Spotless Mind (2004)", translation: "흠 없는 자의 삶은 얼마나 행복한가! 세상을 잊고, 세상에게 잊혀지며. 순수한 마음의 영원한 햇살!", pronunciation: "하우 해피 이즈 더 블레임리스 베스틀즈 랏! 더 월드 포게팅, 바이 더 월드 포갓. 이터널 션샤인 오브 더 스팟리스 마인드!" },
  { text: "I could die right now, Clem. I'm just happy. I've never felt that before. I'm just exactly where I want to be.", character: "Joel", movie: "Eternal Sunshine of the Spotless Mind (2004)", translation: "지금 죽어도 좋아, 클렘. 난 그냥 행복해. 이런 느낌은 처음이야. 딱 내가 있고 싶은 곳에 있어.", pronunciation: "아이 쿠드 다이 라잇 나우, 클렘. 아임 저스트 해피. 아이브 네버 펠트 댓 비포어." },
  { text: "I'm just a girl, standing in front of a boy, asking him to love her.", character: "Anna Scott", movie: "Notting Hill (1999)", translation: "나는 그냥 한 소녀예요, 한 남자 앞에 서서, 그에게 사랑해달라고 부탁하는.", pronunciation: "아임 저스트 어 걸, 스탠딩 인 프런트 오브 어 보이, 애스킹 힘 투 러브 허." },
  { text: "After all... I'm just a girl, asking a boy to love her.", character: "Anna Scott", movie: "Notting Hill (1999)", translation: "결국... 나는 그냥 한 소녀일 뿐이에요, 사랑해달라고 부탁하는.", pronunciation: "애프터 올... 아임 저스트 어 걸, 애스킹 어 보이 투 러브 허." },
  { text: "The thing about romance is people only get together right at the very end.", character: "William", movie: "Notting Hill (1999)", translation: "로맨스의 묘미는 사람들이 딱 마지막 순간에만 함께한다는 거야.", pronunciation: "더 씽 어바웃 로맨스 이즈 피플 온리 겟 투게더 라잇 앳 더 베리 엔드." }
];

// ============ STATE ============
let shuffled = [...quotes].sort(() => Math.random() - 0.5);
let currentIdx = 0;
let revealed = false;

// ============ HELPERS ============
document.addEventListener('DOMContentLoaded', () => {
const $ = (id) => document.getElementById(id);
const pad = (n) => String(n).padStart(2, '0');
const getCurrent = () => shuffled[currentIdx];

function speak(text, rate = 0.9) {
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'en-US';
  utt.rate = rate;
  utt.pitch = 1.0;
  const voices = window.speechSynthesis.getVoices();
  const v = voices.find(v => v.lang.startsWith('en') && v.name.includes('Google'))
         || voices.find(v => v.lang.startsWith('en-US'))
         || voices.find(v => v.lang.startsWith('en'));
  if (v) utt.voice = v;
  window.speechSynthesis.speak(utt);
}

if (typeof speechSynthesis !== 'undefined') {
  speechSynthesis.onvoiceschanged = () => {};
}

// ============ RENDER ============
function render() {
  const q = getCurrent();
  
  // Meta
  $('sceneNum').textContent = pad(currentIdx + 1);
  $('currentNum').textContent = currentIdx + 1;
  $('totalNum').textContent = shuffled.length;
  $('movieTitle').textContent = q.movie;
  
  // Quote: show immediately
  revealed = true;
  $('quote').textContent = `"${q.text}"`;
  $('quote').classList.remove('hidden');
  $('movieLabel').textContent = q.movie;
  $('character').textContent = q.character;
  
  // Reset pronunciation & translation
  $('pronunciation').classList.remove('show');
  $('pronunciation').textContent = q.pronunciation;
  $('translation').classList.remove('show');
  $('translation').innerHTML = `<strong>해석</strong> ${q.translation}`;
  
  // Auto-play once on entering the scene
  setTimeout(() => speak(q.text, 0.9), 200);
}

function revealQuote() {
  const q = getCurrent();
  revealed = true;
  $('quote').textContent = `"${q.text}"`;
  $('quote').classList.remove('hidden');
}

// ============ EVENT HANDLERS ============
$('replayBtn').onclick = () => speak(getCurrent().text, 0.9);
$('slowBtn').onclick = () => speak(getCurrent().text, 0.55);
$('revealBtn').onclick = () => revealed ? null : revealQuote();
$('pronounceBtn').onclick = () => $('pronunciation').classList.toggle('show');
$('translateBtn').onclick = () => $('translation').classList.toggle('show');

$('prevBtn').onclick = () => {
  currentIdx = (currentIdx - 1 + shuffled.length) % shuffled.length;
  render();
};

$('nextBtn').onclick = () => {
  currentIdx = (currentIdx + 1) % shuffled.length;
  render();
};

// Keyboard shortcut: spacebar to replay (when not typing)
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') {
    e.preventDefault();
    speak(getCurrent().text, 0.9);
  }
});

// ============ INIT ============
render();
}); // end DOMContentLoaded
</script>

</body>
</html>
